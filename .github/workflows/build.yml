name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for macOS
        run: npm run build:mac

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: wx-typesetter-mac
          path: dist/*.dmg
          if-no-files-found: error

  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Remove canvas before rebuild
        run: rm -rf node_modules/fabric/node_modules/canvas
        shell: bash

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps
        env:
          GYP_MSVS_VERSION: 2022

      - name: Build for Windows
        run: npm run build:win

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: wx-typesetter-win
          path: dist/*.exe
          if-no-files-found: error

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
